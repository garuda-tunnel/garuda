---
# Phase 3.5: border/backbone network checks for k3s + Multus.

- name: "§3.5k — assert NetworkAttachmentDefinitions exist"
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
        -n garuda get network-attachment-definitions.k8s.cni.cncf.io
        backbone border
  become: true
  changed_when: false
  register: _nads

- name: "§3.5k — assert host bridges exist"
  ansible.builtin.command:
    cmd: "ip link show {{ item }}"
  become: true
  changed_when: false
  loop: [backbone, border]
  loop_control:
    label: "{{ item }}"
  register: _bridges

- name: "§3.5k — read bridge membership"
  ansible.builtin.command:
    cmd: bridge link show
  become: true
  changed_when: false
  register: _bridge_links

- name: "§3.5k — assert bridges have pod veth members"
  ansible.builtin.assert:
    that:
      - _bridge_links.stdout is search('master backbone')
      - _bridge_links.stdout is search('master border')
    fail_msg: |
      host bridges backbone/border must have pod veth members on {{ inventory_hostname }}.
      bridge link output:
      {{ _bridge_links.stdout }}

# border egress moved from ipt-server to the border_router pod (the local
# "WireGuard pod without the tunnel"). ipt-server is now backbone-only, so the
# border interface lives on border-router; read it from the frr-sidecar
# container (shares the pod netns, ships iproute2).
- name: "§3.5k — read border-router border interface addresses on hub"
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
        -n garuda exec deploy/border-router -c frr-sidecar --
        ip -o addr show border
  become: true
  register: _border_router_border
  changed_when: false
  when: z2g_role == 'hub'

- name: "§3.5k — assert border-router border interface has an address in {{ z2g_border_subnet }} on hub"
  ansible.builtin.assert:
    that: >-
      _border_router_border.stdout_lines
        | map('regex_findall', '\\binet (\\S+)')
        | flatten
        | map('ansible.utils.ipaddr', z2g_border_subnet)
        | select
        | list | length > 0
    fail_msg: "border iface in border-router must have address in {{ z2g_border_subnet }}"
  when: z2g_role == 'hub'
