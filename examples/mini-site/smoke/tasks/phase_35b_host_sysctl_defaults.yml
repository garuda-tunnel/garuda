---
# Phase 3.5b — verify host-level sysctl state is clean on all Linux hosts.
# All hosts (hub and edges) now receive net.ipv4.ip_forward=1 via the
# 99-garuda-ip-forward.conf drop-in written by modules/k3s_cloud_init
# cloud-init. The linux_host_prerequisites role (former source of this
# sysctl) has been removed; the cloud-init drop-in is the sole authority.

- name: "§3.5b — stat /etc/sysctl.d/99-garuda-prerequisites.conf"
  ansible.builtin.stat:
    path: /etc/sysctl.d/99-garuda-prerequisites.conf
  become: true
  register: _legacy_sysctl_garuda

- name: "§3.5b — assert legacy sysctl override file is absent"
  ansible.builtin.assert:
    that:
      - not _legacy_sysctl_garuda.stat.exists
    fail_msg: >-
      Legacy sysctl override file /etc/sysctl.d/99-garuda-prerequisites.conf
      still exists on {{ inventory_hostname }}. Remove it manually (the
      cleanup playbook has been removed with linux_host_prerequisites).

- name: "§3.5b — find any unexpected /etc/sysctl.d/ files with garuda in name"
  ansible.builtin.find:
    paths: /etc/sysctl.d
    patterns: "*garuda*.conf"
    excludes: "99-garuda-ip-forward.conf"
  become: true
  register: _project_sysctl_files

- name: "§3.5b — assert no unexpected project-named sysctl files remain"
  ansible.builtin.assert:
    that: _project_sysctl_files.matched == 0
    fail_msg: >-
      Unexpected project-named sysctl file(s) on {{ inventory_hostname }}:
      {{ _project_sysctl_files.files | map(attribute='path') | list }}.
      Only 99-garuda-ip-forward.conf (written by modules/k3s_cloud_init
      cloud-init to enable net.ipv4.ip_forward) is allowed.

- name: "§3.5b — read net.ipv4.ip_forward"
  ansible.builtin.command:
    cmd: sysctl -n net.ipv4.ip_forward
  become: true
  register: _ip_forward
  changed_when: false

- name: "§3.5b — assert ip_forward is 1"
  ansible.builtin.assert:
    that: _ip_forward.stdout | int == 1
    fail_msg: >-
      net.ipv4.ip_forward on {{ inventory_hostname }} is
      {{ _ip_forward.stdout }}, expected 1. All hosts get this from the
      99-garuda-ip-forward.conf drop-in written by modules/k3s_cloud_init
      cloud-init. Check `sysctl net.ipv4.ip_forward` and cloud-init logs.

- name: "§3.5b — read net.ipv4.conf.all.rp_filter"
  ansible.builtin.command:
    cmd: sysctl -n net.ipv4.conf.all.rp_filter
  become: true
  register: _rp_filter_all
  changed_when: false

- name: "§3.5b — report rp_filter (diagnostic, not asserted)"
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} net.ipv4.conf.all.rp_filter={{ _rp_filter_all.stdout }}"
