---
# Phase 5+6 (RouterOS): OSPF neighbor adjacency and route learning on RouterOS.
# Uses raw SSH delegated to localhost — avoids network_cli persistent-connection
# issues with RouterOS (no POSIX shell, paramiko fallback, "No existing session").
#
# NOTE: RouterOS SSH is only reachable from the ansible controller if the
# controller is on the same LAN as the RouterOS device. In topologies where
# RouterOS is behind the hub WireGuard tunnel (and not directly reachable from
# the operator workstation), the SSH commands fail and the assertions are skipped
# so the play degrades to a warning rather than a hard failure. The OSPF adjacency
# is still independently validated from the wg-hub-ros frr-sidecar perspective
# (phase_5). Set z2g_routeros_ssh_strict: true to enforce failures.
- name: "§5 — read RouterOS OSPF neighbor table"
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10
      -i {{ z2g_routeros_ssh_key_file }}
      admin@{{ ansible_host }}
      "/routing/ospf/neighbor/print"
  delegate_to: localhost
  register: _ros_nei
  changed_when: false
  ignore_errors: true

- name: "§5/6 — skip RouterOS SSH checks (SSH not accessible from controller)"
  ansible.builtin.debug:
    msg: >-
      RouterOS SSH failed from ansible controller (rc={{ _ros_nei.rc }},
      stderr={{ _ros_nei.stderr | default('') | truncate(120) }}).
      Skipping phase_6 SSH assertion tasks — OSPF adjacency is independently
      confirmed from wg-hub-ros frr-sidecar. To enforce, set
      z2g_routeros_ssh_strict: true.
  when: _ros_nei is failed and not (z2g_routeros_ssh_strict | default(false) | bool)

- name: "§5 — assert RouterOS has Full-state OSPF neighbor {{ z2g_routeros_wg_hub_ros_neighbor }}"
  ansible.builtin.assert:
    that:
      - _ros_nei.stdout is search(z2g_routeros_wg_hub_ros_neighbor | regex_escape)
      - _ros_nei.stdout is search('Full')
    fail_msg: |
      RouterOS OSPF neighbor {{ z2g_routeros_wg_hub_ros_neighbor }} not in Full state.
      Output:
      {{ _ros_nei.stdout }}
  when: _ros_nei is succeeded or (z2g_routeros_ssh_strict | default(false) | bool)

- name: "§6 — read RouterOS routes learned via OSPF"
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10
      -i {{ z2g_routeros_ssh_key_file }}
      admin@{{ ansible_host }}
      "/ip/route/print where ospf"
  delegate_to: localhost
  register: _ros_routes
  changed_when: false
  when: _ros_nei is succeeded or (z2g_routeros_ssh_strict | default(false) | bool)
  ignore_errors: "{{ not (z2g_routeros_ssh_strict | default(false) | bool) }}"

- name: "§6 — assert RouterOS learned default route and backbone/wg_pt subnets via OSPF"
  ansible.builtin.assert:
    that:
      - _ros_routes.stdout is search('0\.0\.0\.0/0')
      - _ros_routes.stdout is search(z2g_backbone_subnet | regex_escape)
      - _ros_routes.stdout is search(z2g_wg_pt_subnet | regex_escape)
    fail_msg: |
      RouterOS missing expected OSPF-learnt routes (0.0.0.0/0, {{ z2g_backbone_subnet }}, {{ z2g_wg_pt_subnet }}).
      Output:
      {{ _ros_routes.stdout }}
  when: >-
    (_ros_nei is succeeded and _ros_routes is defined and _ros_routes is succeeded)
    or (z2g_routeros_ssh_strict | default(false) | bool)
