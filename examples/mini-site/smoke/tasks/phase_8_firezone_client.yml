---
# Phase 8: end-to-end connectivity from Firezone WG client.
# Runs on firezone_clients group (single host, fz-client-*).
# The client MUST have a compose-managed wg-client up before this phase runs.
- name: "§8.1 — assert WG client can reach RouterOS LAN gateway ({{ z2g_routeros_lan_gw }})"
  community.docker.docker_container_exec:
    container: wg-client
    argv: [ping, -c, "3", -W, "2", "{{ z2g_routeros_lan_gw }}"]
  become: true
  register: _ping_lan
  changed_when: false
  failed_when: _ping_lan.rc != 0

- name: "§8.2 — assert WG client can reach non-RU internet (1.1.1.1)"
  community.docker.docker_container_exec:
    container: wg-client
    argv: [ping, -c, "3", -W, "2", 1.1.1.1]
  become: true
  register: _ping_cf
  changed_when: false
  failed_when: _ping_cf.rc != 0

- name: "§8.2 — read ipt_server geo table {{ z2g_geo_table }} routes"
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
        -n garuda exec deploy/ipt-server -c ipt-server --
        ip route show table {{ z2g_geo_table }}
  become: true
  delegate_to: "{{ groups['linux_hosts'] | select('match', '^hub') | first }}"
  register: _routes_geo
  changed_when: false

- name: "§8.2 — assert default in geo table exits via wg_de (non-RU geo path, de is primary)"
  ansible.builtin.assert:
    that:
      - _routes_geo.stdout is search('default.*via [0-9]+\.[0-9]+\.[0-9]+\.[0-9]+.*dev backbone')
    fail_msg: >-
      Geo table {{ z2g_geo_table }} default must exit via a resolved backbone nexthop;
      non-RU traffic uses the default route, not an explicit per-IP entry.
      Got: {{ _routes_geo.stdout | truncate(200) }}

- name: "§8.3 — assert WG client can reach RU internet (2ip.ru)"
  community.docker.docker_container_exec:
    container: wg-client
    argv: [ping, -c, "3", -W, "3", 2ip.ru]
  become: true
  register: _ping_ru
  changed_when: false
  failed_when: _ping_ru.rc != 0

- name: "§8.3 — read pdns logs (last 500 lines)"
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
        -n garuda logs deploy/ipt-server -c powerdns --tail=500
  become: true
  delegate_to: "{{ groups['linux_hosts'] | select('match', '^hub') | first }}"
  register: _pdns_log
  changed_when: false

- name: "§8.3 — assert pdns forwarded 2ip.ru query (domain resolved via pdns WebSocket)"
  ansible.builtin.assert:
    that: (_pdns_log.stdout + _pdns_log.stderr) is search('2ip\.ru')
    fail_msg: "pdns logs have no entries for 2ip.ru — domain not resolved or not forwarded to WebSocket"

- name: "§8.3 — read public IP seen by wg-client via ifconfig.co"
  community.docker.docker_container_exec:
    container: wg-client
    argv: [wget, -qO-, --timeout=5, "http://ifconfig.co"]
  become: true
  register: _pub_ip
  changed_when: false
  failed_when: _pub_ip.rc != 0

- name: "§8.3 — assert wg-client egresses via de ({{ hostvars['localhost'].de_public_ip }}), not hub direct"
  ansible.builtin.assert:
    that:
      - _pub_ip.stdout | trim == hostvars['localhost'].de_public_ip
      - _pub_ip.stdout | trim != hostvars['localhost'].hub_public_ip
    fail_msg: |
      Public IP via wg-client is '{{ _pub_ip.stdout | trim }}'.
      Expected: {{ hostvars['localhost'].de_public_ip }} (de edge, primary non-RU egress).
      Not expected: {{ hostvars['localhost'].hub_public_ip }} (hub direct).
