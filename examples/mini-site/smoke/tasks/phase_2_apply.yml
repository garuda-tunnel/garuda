---
# Checklist §2: terraform init/plan/apply. DESTRUCTIVE.
# Default behaviour: skip entirely with a clear message.
# Opt-in: -e allow_apply=yes
- name: "§2 — guard: phase 2 skipped (allow_apply not set)"
  ansible.builtin.debug:
    msg: "Phase 2 (terraform apply) skipped — pass -e allow_apply=yes to enable"
  when: not (allow_apply | default(false) | bool)

- name: "§2 — guard: skip remaining apply tasks"
  ansible.builtin.meta: end_host
  when: not (allow_apply | default(false) | bool)

- name: "§2 — notice: apply is enabled"
  ansible.builtin.debug:
    msg: "allow_apply=yes set; running terraform init/plan/apply"

- name: "§2 — terragrunt init"
  ansible.builtin.command:
    cmd: terragrunt init -input=false
    chdir: "{{ z2g_terraform_dir }}"
  register: _tf_init
  changed_when: "'has been successfully initialized' in _tf_init.stdout"
  failed_when: _tf_init.rc != 0

# -parallelism=1 works around a terraform-provider-helm race: multiple
# helm_release resources that resolve to the SAME deduplicated chart
# directory (all wireguard_kube* modules share one git-source checkout) run
# `helm dependency update` concurrently on a shared `charts/.../tmpcharts-*`
# dir and collide ("could not download oci://.../frr-sidecar: ... no such
# file or directory"). The provider has no per-instance dep-build isolation
# and the upstream issue is won't-fix (hashicorp/terraform-provider-helm
# #767, #551). Vendoring the dep is forbidden by AGENTS.md, so serialize.
- name: "§2 — terragrunt plan"
  ansible.builtin.command:
    cmd: terragrunt plan -input=false -parallelism=1
    chdir: "{{ z2g_terraform_dir }}"
  register: _tf_plan
  changed_when: false
  failed_when: _tf_plan.rc != 0

- name: "§2 — terragrunt apply"
  ansible.builtin.command:
    cmd: terragrunt apply -input=false -auto-approve -parallelism=1
    chdir: "{{ z2g_terraform_dir }}"
  register: _tf_apply
  changed_when: "'Apply complete' in _tf_apply.stdout"
  failed_when: _tf_apply.rc != 0
