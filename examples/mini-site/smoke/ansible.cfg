[defaults]
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
callbacks_enabled = profile_tasks
gathering = explicit
forks = 10
interpreter_python = auto_silent
# Ansible-level connect timeout (default 10 s is too aggressive for
# cross-region transit). Conservative SSH timeouts for cross-region transit.
timeout = 30

[ssh_connection]
pipelining = True
# Retry SSH connect on transient transport failures so a single dropped
# packet does not abort the smoke playbook with UNREACHABLE.
retries = 5
# ConnectTimeout + ServerAlive* keep the channel alive during long-running
# tasks (docker pulls, image loads).
ssh_args = -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4
