# Source: garuda-cni/templates/multus-daemonset.yaml
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: multus
  labels:
    app.kubernetes.io/managed-by: Helm
    garuda.managed-by: helm
rules:
  - apiGroups: ["k8s.cni.cncf.io"]
    resources:
      - '*'
    verbs:
      - '*'
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/status
    verbs:
      - get
      - update
      # list/watch are required by Multus' thick-plugin pod-networks
      # controller. Without them the controller logs
      # `pods is forbidden: User \"system:serviceaccount:kube-system:multus\"
      # cannot list resource \"pods\" in API group \"\" at the cluster scope`
      # and Multus never reconciles `k8s.v1.cni.cncf.io/networks` pod
      # annotations into actual secondary interfaces, so workload pods end
      # up with only the primary CNI interface — backbone and border NADs
      # are silently ignored.
      - list
      - watch
  - apiGroups:
      - ""
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
      - update
