# Source: garuda-cni/templates/whereabouts-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts
  namespace: kube-system
  labels:
    tier: node
    app: whereabouts
    app.kubernetes.io/managed-by: Helm
    garuda.managed-by: helm
spec:
  selector:
    matchLabels:
      name: whereabouts
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: whereabouts
        name: whereabouts
    spec:
      hostNetwork: true
      serviceAccountName: whereabouts
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: whereabouts
        command: [ "/bin/sh" ]
        args:
          - -c
          - |
            SLEEP=false source /install-cni.sh
            /token-watcher.sh &
            /ip-control-loop -log-level debug
        image: "rancher/hardened-whereabouts:v0.9.3-build20260511"
        env:
        - name: NODENAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CNI_CONF_DIR
          value: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: CNI_BIN_DIR
          value: /host/var/lib/rancher/k3s/data/cni
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "200Mi"
        securityContext:
          privileged: true
        volumeMounts:
        - name: cnibin
          mountPath: /host/var/lib/rancher/k3s/data/cni
        - name: cni-net-dir
          mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: cron-scheduler-configmap
          mountPath: /cron-schedule
      volumes:
        - name: cnibin
          hostPath:
            path: /var/lib/rancher/k3s/data/cni
        - name: cni-net-dir
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: cron-scheduler-configmap
          configMap:
            name: "whereabouts-config"
            defaultMode: 0744
            items:
            - key: "cron-expression"
              path: "config"
