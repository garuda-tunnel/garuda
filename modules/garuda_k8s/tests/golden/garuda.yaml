# Source: garuda/templates/multus-readiness-hook.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: g-garuda-multus-ready
  namespace: garuda
  labels:
    app.kubernetes.io/name: garuda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: g
    garuda.managed-by: helm
    app.kubernetes.io/component: multus-readiness
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: 360
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multus-readiness
        app.kubernetes.io/part-of: garuda
    spec:
      serviceAccountName: g-garuda-multus-gate
      restartPolicy: Never
      containers:
        - name: kubectl-wait
          image: bitnami/kubectl:1.36.2@sha256:08afc880eea24f36572644ccae85fb3e573a6ff1b7161135a3ae9a5eab222df2
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              echo "Waiting for kube-multus-ds rollout (timeout 300s)..."
              kubectl -n kube-system rollout status ds/kube-multus-ds \
                --timeout=300s
              echo "Waiting for all nodes Ready (timeout 120s)..."
              kubectl wait --for=condition=Ready node --all \
                --timeout=120s
              echo "Multus readiness gate cleared."
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
