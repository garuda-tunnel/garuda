# Source: garuda/templates/profile-cm-border.yaml
# Profile: border
# Role: border-router (spec §6.3)
# Key invariants: transit_role=none; sysctl variant B (no src_valid_mark);
# border-router is never a transit consumer; egress-setup init stays in guest chart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: garuda-profile-border
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: garuda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: g
    garuda.managed-by: helm
    net.garuda-tunnel/kind: NetworkProfile
data:
  sidecar_image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:0.3.3"
  transit_role: "none"
  default_originate: "false"
  # Sysctl variant B: ip_forward + rp_filter only (no src_valid_mark — spec §6.2 finding #3).
  sysctl_set: "ip_forward,rp_filter"
  daemons: |
    zebra=yes
    ospfd=yes
    bgpd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    nhrpd=no
  # FRR template for border: backbone is OSPF-active (hello/dead/mtu-ignore); dummy0 is
  # OSPF-passive (area + `ip ospf passive` ONLY — no timers, no mtu-ignore). This matches
  # prod ground truth exactly (docs/artifacts/2026-06-25-vxxlcx-prod-frr-ground-truth.md
  # §2.6): dummy0 is advertised for router-id /32 materialisation but sends no hellos.
  # Interface names are hardcoded for border role (backbone@backbone confirmed in
  # border-router-internal/_helpers.tpl:18-20; dummy0 for router-id /32 materialisation).
  # NOTE: dummy0 passive is expressed in the interface stanza (`ip ospf passive`), matching
  # prod, rather than `passive-interface dummy0` in `router ospf` (FRR-equivalent, D5).
  frr.conf.tmpl: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    !
    interface backbone
      ip ospf area 0.0.0.0
      ip ospf hello-interval 5
      ip ospf dead-interval 15
      ip ospf mtu-ignore
    !
    interface dummy0
      ip ospf area 0.0.0.0
      ip ospf passive
    !
    router ospf
      ospf router-id ${ROUTER_ID}
      ${REDISTRIBUTE_BLOCK}
      ${DEFAULT_ORIGINATE_BLOCK}
    !

---
# Source: garuda/templates/profile-cm-ospf-router.yaml
# Profile: ospf-router
# Roles: wireguard (hub-wg per-edge, hub-ros), firezone
# Spec §6.3: transit_role=none; sysctl variant A (with src_valid_mark).
# Differentiation between hub-wg, edge-wg, hub-ros is done via annotations
# (default-originate, redistribute, nic-attach, transit-interfaces) — NOT profile variants.
apiVersion: v1
kind: ConfigMap
metadata:
  name: garuda-profile-ospf-router
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: garuda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: g
    garuda.managed-by: helm
    net.garuda-tunnel/kind: NetworkProfile
data:
  # Sidecar image — bumped by frr-sidecar-internal release-please pipeline (PR #10 → 0.3.0).
  # Override per-stand with .Values.frr_sidecar_image; override per-pod with
  # net.garuda-tunnel/sidecar-image annotation (Tier 1 escape hatch, spec §15).
  sidecar_image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:0.3.3"
  # Profile metadata
  transit_role: "none"
  default_originate: "false"
  # Sysctl variant A: includes src_valid_mark (required by WireGuard and Firezone — spec §6.2, finding #3).
  # MAP injects: net.ipv4.ip_forward=1, net.ipv4.conf.all.rp_filter=2 (pod-level, via JSONPatch).
  # src_valid_mark=1 stays in guest chart securityContext (wireguard deployment.yaml:37-44).
  sysctl_set: "ip_forward,rp_filter,src_valid_mark"
  # FRR daemon enablement (baked-in constants per spec §6.2: zebra+ospfd only).
  daemons: |
    zebra=yes
    ospfd=yes
    bgpd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    nhrpd=no
  # FRR config template — rendered by frr-sidecar entrypoint (render_frr.py) at container startup.
  # Placeholders: ${ROUTER_ID}, ${OSPF_INTERFACES_BLOCK}, ${REDISTRIBUTE_BLOCK}, ${DEFAULT_ORIGINATE_BLOCK}.
  # Baked-in constants (spec §6.2): area 0.0.0.0, hello=5/dead=15, ip ospf mtu-ignore,
  # zebra nexthop proto only, frr defaults traditional.
  # NOTE: ${OSPF_INTERFACES_BLOCK} renders top-level `interface X` stanzas and MUST appear
  # at the global scope, NOT inside `router ospf`. The `router ospf` block only contains
  # ospf router-scoped directives: router-id, redistribute, default-information originate.
  frr.conf.tmpl: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    !
    ${OSPF_INTERFACES_BLOCK}
    router ospf
      ospf router-id ${ROUTER_ID}
      ${REDISTRIBUTE_BLOCK}
      ${DEFAULT_ORIGINATE_BLOCK}
    !

---
# Source: garuda/templates/profile-cm-transit-provider.yaml
# Profile: transit-provider
# Role: ipt-server (OSPF transit provider; PBR kernel table 201 — spec §6.3)
# Key invariants: transit_role=provider; default_originate=true; sysctl variant B (no src_valid_mark).
# MUST NOT carry transit-interfaces annotation (XOR invariant — VAP Rule 2, spec §4.2).
# redistribute=kernel is EXCLUDED from this profile (invariant — prevents tag break — spec §6.3).
apiVersion: v1
kind: ConfigMap
metadata:
  name: garuda-profile-transit-provider
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: garuda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: g
    garuda.managed-by: helm
    net.garuda-tunnel/kind: NetworkProfile
data:
  sidecar_image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:0.3.3"
  transit_role: "provider"
  default_originate: "true"
  # Sysctl variant B: ip_forward + rp_filter only (no src_valid_mark — spec §6.2 finding #3).
  sysctl_set: "ip_forward,rp_filter"
  daemons: |
    zebra=yes
    ospfd=yes
    bgpd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    nhrpd=no
  # FRR template for transit-provider: default-originate always on; no redistribute kernel
  # (tag-break prevention per spec §6.3 and finding #4).
  # The TRANSIT_ORIGINATE route-map stamps tag 201 (PBR selector), metric 100, type-2
  # onto the originated default route. The `default-information originate ... route-map
  # TRANSIT_ORIGINATE` directive references it. This MUST match prod ground truth
  # (docs/artifacts/2026-06-25-vxxlcx-prod-frr-ground-truth.md §2.4 / Q3, gap D4) —
  # without `set tag 201` the ipt-server PBR rules that match tag 201 never fire.
  # NOTE: ${OSPF_INTERFACES_BLOCK} renders top-level `interface X` stanzas and MUST appear
  # at the global scope, NOT inside `router ospf`.
  frr.conf.tmpl: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    !
    route-map TRANSIT_ORIGINATE permit 10
      set tag 201
      set metric 100
      set metric-type type-2
    !
    ${OSPF_INTERFACES_BLOCK}
    router ospf
      ospf router-id ${ROUTER_ID}
      default-information originate always metric 100 metric-type 2 route-map TRANSIT_ORIGINATE
      ${REDISTRIBUTE_BLOCK}
    !

