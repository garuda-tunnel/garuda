    metadata:
      labels:
        app.kubernetes.io/name: pod-reaper
    spec:
      serviceAccountName: g-garuda-pod-reaper
      containers:
        - name: pod-reaper
          image: "target/pod-reaper:2.14.0@sha256:b8f908a99d9c503220f195d7f706e8ee0b012954ea10d263d6c219b042d196ec"
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: "garuda"
            - name: MAX_UNREADY
              value: "120s"
            - name: EVICT
              value: "true"
            - name: GRACE_PERIOD
              value: "30s"
            - name: SCHEDULE
              value: "@every 30s"
            - name: EXCLUDE_LABEL_KEY
              value: "app.kubernetes.io/name"
            - name: EXCLUDE_LABEL_VALUES
              value: "pod-reaper"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"

