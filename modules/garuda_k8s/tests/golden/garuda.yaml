apiVersion: apps/v1
kind: Deployment
metadata:
  name: g-garuda-pod-reaper
  namespace: garuda
  labels:
    app.kubernetes.io/name: garuda
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: g
    garuda.managed-by: helm
    app.kubernetes.io/component: pod-reaper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pod-reaper
