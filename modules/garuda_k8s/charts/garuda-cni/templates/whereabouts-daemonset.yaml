{{- if .Values.installCni }}
# Adapted from k8snetworkplumbingwg/whereabouts v0.9.3:
#   * doc/crds/daemonset-install.yaml
#   * doc/crds/whereabouts.cni.cncf.io_ippools.yaml
#   * doc/crds/whereabouts.cni.cncf.io_overlappingrangeipreservations.yaml
#   * doc/crds/whereabouts.cni.cncf.io_nodeslicepools.yaml
# Four upstream files are concatenated below in that order, separated by
# YAML document markers. Only edits applied:
#   * Outer {{- if .Values.installCni }} ... {{- end }} gate (this file).
#   * `app.kubernetes.io/managed-by` and `garuda.managed-by` labels added
#     to each document's metadata.labels block.
#   * k3s-native CNI paths from https://docs.k3s.io/networking/multus-ipams:
#     confDir=/var/lib/rancher/k3s/agent/etc/cni/net.d and
#     binDir=/var/lib/rancher/k3s/data/cni.
#   * Rancher hardened Whereabouts v0.9.3 image pinned from rke2-multus
#     v4.2.413.
# Re-vendoring procedure: see templates/multus/NOTES.md.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whereabouts
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    garuda.managed-by: helm
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: whereabouts
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    garuda.managed-by: helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: whereabouts-cni
subjects:
- kind: ServiceAccount
  name: whereabouts
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: whereabouts-cni
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    garuda.managed-by: helm
rules:
- apiGroups:
  - whereabouts.cni.cncf.io
  resources:
  - ippools
  - overlappingrangeipreservations
  - nodeslicepools
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - '*'
- apiGroups: [""]
  resources:
  - pods
  verbs:
  - list
  - watch
  - get
- apiGroups: [""]
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups: ["k8s.cni.cncf.io"]
  resources:
    - network-attachment-definitions
  verbs:
    - get
    - list
    - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
    - events
  verbs:
  - create
  - patch
  - update
  - get

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whereabouts-config
  namespace: kube-system
  annotations:
    kubernetes.io/description: |
      Configmap containing user customizable cronjob schedule
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    garuda.managed-by: helm
data:
  cron-expression: "30 4 * * *" # Default schedule is once per day at 4:30am. Users may configure this value to their liking.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts
  namespace: kube-system
  labels:
    tier: node
    app: whereabouts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    garuda.managed-by: helm
spec:
  selector:
    matchLabels:
      name: whereabouts
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: whereabouts
        name: whereabouts
    spec:
      hostNetwork: true
      serviceAccountName: whereabouts
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: whereabouts
        command: [ "/bin/sh" ]
        args:
          - -c
          - |
            SLEEP=false source /install-cni.sh
            /token-watcher.sh &
            /ip-control-loop -log-level debug
        image: {{ .Values.versions.whereabouts_image | quote }}
        env:
        - name: NODENAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CNI_CONF_DIR
          value: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: CNI_BIN_DIR
          value: /host/var/lib/rancher/k3s/data/cni
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "200Mi"
        securityContext:
          privileged: true
        volumeMounts:
        - name: cnibin
          mountPath: /host/var/lib/rancher/k3s/data/cni
        - name: cni-net-dir
          mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: cron-scheduler-configmap
          mountPath: /cron-schedule
      volumes:
        - name: cnibin
          hostPath:
            path: /var/lib/rancher/k3s/data/cni
        - name: cni-net-dir
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
        - name: cron-scheduler-configmap
          configMap:
            name: "whereabouts-config"
            defaultMode: 0744
            items:
            - key: "cron-expression"
              path: "config"
---
