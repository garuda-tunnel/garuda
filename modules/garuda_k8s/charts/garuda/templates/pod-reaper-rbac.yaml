{{- if .Values.podReaper.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "garuda.fullname" . }}-pod-reaper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garuda.labels" . | nindent 4 }}
    app.kubernetes.io/component: pod-reaper
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "garuda.fullname" . }}-pod-reaper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garuda.labels" . | nindent 4 }}
    app.kubernetes.io/component: pod-reaper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "garuda.fullname" . }}-pod-reaper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "garuda.labels" . | nindent 4 }}
    app.kubernetes.io/component: pod-reaper
subjects:
  - kind: ServiceAccount
    name: {{ include "garuda.fullname" . }}-pod-reaper
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "garuda.fullname" . }}-pod-reaper
{{- end }}
