# Default values for the garuda chart. The Terraform helm_release
# in modules/garuda_k8s/main.tf overrides these.
namespace: garuda
backboneSubnet: ""
borderSubnet: ""
borderGateway: ""
borderRangeStart: ""

multusReadiness:
  enabled: true
  # External image, pinned by digest. Updates are out-of-band (Renovate or manual).
  image: "bitnami/kubectl:1.36.2@sha256:08afc880eea24f36572644ccae85fb3e573a6ff1b7161135a3ae9a5eab222df2"
  rolloutTimeout: "300s"
  nodeReadyTimeout: "120s"
  # 5-minute fail-fast per AC2: backoffLimit=2 without this could block for ~21 min.
  activeDeadlineSeconds: 360
  # Extended TTL for operator log access after Job completion.
  ttlSecondsAfterFinished: 300

podReaper:
  enabled: true
  # External image, pinned by digest. Updates are out-of-band (Renovate or manual).
  image: "target/pod-reaper:2.14.0@sha256:b8f908a99d9c503220f195d7f706e8ee0b012954ea10d263d6c219b042d196ec"
  maxUnready: "120s"
  evict: "true"
  gracePeriod: "30s"
  schedule: "@every 30s"
  # requireLabelKey / requireLabelValues: enabled after D-follow1 propagated
  # app.kubernetes.io/part-of=garuda to all consumer charts (wireguard v0.5.0,
  # firezone v0.5.0, ipt-server v0.4.0, border-router v0.4.0). Pod-reaper now
  # scopes reaping to Garuda-labelled pods instead of all unready pods in the
  # namespace. Disable per-stand with --set podReaper.requireLabelKey="".
  requireLabelKey: "app.kubernetes.io/part-of"
  requireLabelValues: "garuda"
  # excludeLabelKey / excludeLabelValues: self-reap protection — pod-reaper
  # must not evict itself.
  excludeLabelKey: "app.kubernetes.io/name"
  excludeLabelValues: "pod-reaper"
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"

# frr_sidecar_image: image reference for the frr-sidecar native sidecar.
# Written into all three profile ConfigMaps (garuda-profile-{ospf-router,transit-provider,border})
# under data.sidecar_image. Bumped here when frr-sidecar-internal cuts a new release.
# 0.3.3 pinned: frr-sidecar render.py prod-parity fixes — active OSPF interfaces emit
# hello 5 / dead 15 (D1/D2); redistribute rendered at column 0 so the profile template's
# 2-space indent lands it inside `router ospf` (D3); passive-interface support via
# OSPF_PASSIVE_INTERFACES (D11). Pairs with chart 0.7.2 (transit route-map + passive env).
# Override per-stand with --set frr_sidecar_image=<ref>.
# Override per-pod with net.garuda-tunnel/sidecar-image annotation (Tier 1 escape hatch, spec §15).
frr_sidecar_image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:0.3.3"
