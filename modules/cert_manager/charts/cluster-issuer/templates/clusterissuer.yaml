apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.name | quote }}
spec:
  acme:
    server: {{ .Values.acmeServer | quote }}
    email: {{ .Values.email | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account" .Values.name | quote }}
    solvers:
      - http01:
          ingress:
            class: traefik
